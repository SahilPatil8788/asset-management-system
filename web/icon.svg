<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0c1b"/>
      <stop offset="100%" stop-color="#241a45"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8a2be2"/>
      <stop offset="50%" stop-color="#4361ee"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)"/>
  
  <!-- Outer glowing box outline -->
  <rect x="96" y="96" width="320" height="320" rx="48" fill="none" stroke="url(#glowGrad)" stroke-width="12" filter="url(#glow)" opacity="0.8"/>
  
  <!-- Inner Asset Management Graphic (Shield and Nodes) -->
  <path d="M256,160 L350,200 L350,300 C350,350 256,380 256,380 C256,380 162,350 162,300 L162,200 Z" fill="none" stroke="url(#glowGrad)" stroke-width="16" stroke-linejoin="round" filter="url(#glow)"/>
  
  <!-- Node Dots inside shield -->
  <circle cx="256" cy="220" r="16" fill="#10b981" filter="url(#glow)"/>
  <circle cx="210" cy="290" r="16" fill="#4361ee" filter="url(#glow)"/>
  <circle cx="302" cy="290" r="16" fill="#8a2be2" filter="url(#glow)"/>
  
  <!-- Connection lines -->
  <line x1="256" y1="220" x2="210" y2="290" stroke="#f1ecf7" stroke-width="4" opacity="0.6"/>
  <line x1="256" y1="220" x2="302" y2="290" stroke="#f1ecf7" stroke-width="4" opacity="0.6"/>
  <line x1="210" y1="290" x2="302" y2="290" stroke="#f1ecf7" stroke-width="4" opacity="0.6"/>
</svg>
